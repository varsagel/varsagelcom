<!DOCTYPE html>
<html>
<head>
    <title>Test Register</title>
</head>
<body>
    <h1>Test Register Form</h1>
    <form id="registerForm">
        <input type="text" id="name" placeholder="Name" value="Test User" required><br><br>
        <input type="email" id="email" placeholder="Email" value="test@example.com" required><br><br>
        <input type="password" id="password" placeholder="Password" value="123456" required><br><br>
        <button type="submit">Register</button>
    </form>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            console.log('Sending data:', formData);
            
            try {
                const response = await fetch('https://varsagelcom-pziokhkwn-varsagelcoms-projects.vercel.app/api/trpc/auth.register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        "0": {
                            "json": formData
                        }
                    })
                });
                
                const result = await response.text();
                console.log('Response:', response.status, result);
                
                if (response.ok) {
                    alert('Registration successful!');
                } else {
                    alert('Registration failed: ' + result);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
